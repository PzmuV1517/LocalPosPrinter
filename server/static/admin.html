<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sunmi Print Hub — Admin</title>
  <style>
    :root { --fg:#1b1b1b; --muted:#666; --line:#ddd; --brand:#1565C0; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
           color: var(--fg); margin: 0; background:#f5f6f8; }
    header { background: var(--brand); color:#fff; padding: 14px 20px; display:flex;
             justify-content:space-between; align-items:center; }
    header h1 { margin:0; font-size: 18px; }
    header a { color:#fff; font-size:13px; opacity:.9; }
    .wrap { max-width: 980px; margin: 20px auto; padding: 0 16px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:18px; }
    h2 { font-size:15px; margin:0 0 12px; color:var(--brand); }
    label { display:block; font-size:13px; color:var(--muted); margin: 10px 0 4px; }
    input { width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:6px; font-size:14px; }
    button { background: var(--brand); color:#fff; border:none; border-radius:6px;
             padding:9px 14px; font-size:14px; cursor:pointer; }
    button.secondary { background:#eee; color:#333; }
    button.danger { background:#C62828; }
    .row { display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap; }
    .row > * { flex:1; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { text-align:left; padding:7px 8px; border-bottom:1px solid #eee; vertical-align:top; }
    th { color:var(--muted); font-weight:600; }
    .pill { display:inline-block; padding:1px 8px; border-radius:10px; font-size:12px; }
    .ok { background:#E8F5E9; color:#2E7D32; }
    .off { background:#FBE9E7; color:#C62828; }
    .mono { font-family: ui-monospace, Menlo, Consolas, monospace; }
    .hidden { display:none; }
    #msg { font-size:13px; min-height:18px; margin-top:8px; }
    .scroll { overflow-x:auto; }
    .muted { color:var(--muted); font-size:12px; }
  </style>
</head>
<body>
  <header>
    <h1>Print Hub — Admin</h1>
    <a href="/">← Compose</a>
  </header>

  <div class="wrap">
    <div class="card" id="loginCard">
      <h2>Sign in</h2>
      <label>Master password</label>
      <div class="row">
        <input id="master" type="password" placeholder="master password" style="flex:3" />
        <button id="loginBtn" style="flex:1">Sign in</button>
      </div>
      <div id="loginMsg" class="off pill hidden" style="margin-top:10px"></div>
    </div>

    <div id="portal" class="hidden">
      <div class="card">
        <h2>Create limited-use password</h2>
        <div class="row">
          <div>
            <label>User (who is this for?)</label>
            <input id="newUser" type="text" placeholder="e.g. Front desk" />
          </div>
          <div>
            <label>Max uses</label>
            <input id="newMax" type="number" min="1" value="10" />
          </div>
          <div>
            <label>Password (blank = random)</label>
            <input id="newPassword" type="text" placeholder="letters, numbers, symbols" />
          </div>
          <div style="flex:0 0 auto">
            <button id="createBtn">Create</button>
          </div>
        </div>
        <div id="msg"></div>
      </div>

      <div class="card">
        <h2>Active passwords <span class="muted" id="deviceState"></span></h2>
        <div class="scroll">
          <table>
            <thead>
              <tr><th>Password</th><th>User</th><th>Used / Max</th><th>Remaining</th><th>Status</th><th></th></tr>
            </thead>
            <tbody id="pwBody"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2>Print history</h2>
        <div class="scroll">
          <table>
            <thead>
              <tr><th>When</th><th>Format</th><th>User</th><th>Label</th><th>Status</th></tr>
            </thead>
            <tbody id="histBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let master = '';

    async function api(path, extra = {}) {
      const resp = await fetch(path, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: master, ...extra }),
      });
      return { ok: resp.ok, data: await resp.json().catch(() => ({})) };
    }

    async function login() {
      master = $('master').value;
      const { ok } = await api('/admin/state');
      if (!ok) {
        const m = $('loginMsg'); m.textContent = 'Wrong master password'; m.classList.remove('hidden');
        return;
      }
      $('loginCard').classList.add('hidden');
      $('portal').classList.remove('hidden');
      refresh();
    }

    function fmtTime(ts) {
      const d = new Date(ts * 1000);
      return d.toLocaleString();
    }
    function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    async function refresh() {
      const { ok, data } = await api('/admin/state');
      if (!ok) return;
      $('deviceState').textContent = data.device_connected ? '· device connected' : '· no device connected';

      $('pwBody').innerHTML = (data.passwords || []).map(p => {
        const status = p.revoked ? '<span class="pill off">revoked</span>'
          : (p.active ? '<span class="pill ok">active</span>' : '<span class="pill off">exhausted</span>');
        const btn = p.revoked ? '' :
          `<button class="danger" data-revoke="${esc(p.password)}">Revoke</button>`;
        return `<tr>
          <td class="mono">${esc(p.password)}</td>
          <td>${esc(p.user) || '<span class="muted">—</span>'}</td>
          <td>${p.used} / ${p.max_uses}</td>
          <td>${p.remaining}</td>
          <td>${status}</td>
          <td>${btn}</td></tr>`;
      }).join('') || '<tr><td colspan="6" class="muted">No passwords yet.</td></tr>';

      $('histBody').innerHTML = (data.history || []).map(h => `
        <tr>
          <td>${fmtTime(h.timestamp)}</td>
          <td>${esc(h.format)}</td>
          <td>${esc(h.user) || '<span class="muted">—</span>'}</td>
          <td>${esc(h.label)}</td>
          <td>${esc(h.status)}</td></tr>`).join('')
        || '<tr><td colspan="5" class="muted">Nothing printed yet.</td></tr>';

      document.querySelectorAll('[data-revoke]').forEach(b => {
        b.onclick = async () => { await api('/admin/revoke', { target: b.getAttribute('data-revoke') }); refresh(); };
      });
    }

    async function create() {
      const user = $('newUser').value;
      const max_uses = parseInt($('newMax').value, 10) || 1;
      const new_password = $('newPassword').value;
      const { ok, data } = await api('/admin/create', { user, max_uses, new_password });
      const msg = $('msg');
      if (ok) {
        msg.style.color = '#2E7D32';
        msg.textContent = `Created "${data.password.password}" for ${data.password.user || '—'} (${data.password.max_uses} uses)`;
        $('newPassword').value = '';
        refresh();
      } else {
        msg.style.color = '#C62828';
        msg.textContent = data.error || 'Create failed';
      }
    }

    $('loginBtn').addEventListener('click', login);
    $('master').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    $('createBtn').addEventListener('click', create);
    setInterval(() => { if (!$('portal').classList.contains('hidden')) refresh(); }, 8000);
  </script>
</body>
</html>
