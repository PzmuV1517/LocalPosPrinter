<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sunmi Print Hub — Admin</title>
  <style>
    :root { --fg:#1b1b1b; --muted:#666; --line:#ddd; --brand:#1565C0; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
           color: var(--fg); margin: 0; background:#f5f6f8; }
    header { background: var(--brand); color:#fff; padding: 14px 20px; display:flex;
             justify-content:space-between; align-items:center; }
    header h1 { margin:0; font-size: 18px; }
    header a { color:#fff; font-size:13px; opacity:.9; }
    .wrap { max-width: 980px; margin: 20px auto; padding: 0 16px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:18px; }
    h2 { font-size:15px; margin:0 0 12px; color:var(--brand); }
    label { display:block; font-size:13px; color:var(--muted); margin: 10px 0 4px; }
    input { width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:6px; font-size:14px; }
    button { background: var(--brand); color:#fff; border:none; border-radius:6px;
             padding:9px 14px; font-size:14px; cursor:pointer; }
    button.secondary { background:#eee; color:#333; }
    button.danger { background:#C62828; }
    .row { display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap; }
    .row > * { flex:1; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { text-align:left; padding:7px 8px; border-bottom:1px solid #eee; vertical-align:top; }
    th { color:var(--muted); font-weight:600; }
    .pill { display:inline-block; padding:1px 8px; border-radius:10px; font-size:12px; }
    .ok { background:#E8F5E9; color:#2E7D32; }
    .off { background:#FBE9E7; color:#C62828; }
    .mono { font-family: ui-monospace, Menlo, Consolas, monospace; }
    .hidden { display:none; }
    #msg { font-size:13px; min-height:18px; margin-top:8px; }
    .scroll { overflow-x:auto; }
    .muted { color:var(--muted); font-size:12px; }
  </style>
</head>
<body>
  <header>
    <h1>Print Hub — Admin</h1>
    <a href="/">← Compose</a>
  </header>

  <div class="wrap">
    <div class="card" id="loginCard">
      <h2>Sign in</h2>
      <label>Master password</label>
      <div class="row">
        <input id="master" type="password" placeholder="master password" style="flex:3" />
        <button id="loginBtn" style="flex:1">Sign in</button>
      </div>
      <div id="loginMsg" class="off pill hidden" style="margin-top:10px"></div>
    </div>

    <div id="portal" class="hidden">
      <div class="card">
        <h2>Create limited-use password</h2>
        <div class="row">
          <div>
            <label>User (who is this for?)</label>
            <input id="newUser" type="text" placeholder="e.g. Front desk" />
          </div>
          <div>
            <label>Max uses</label>
            <input id="newMax" type="number" min="1" value="10" />
          </div>
          <div>
            <label>Password (blank = random)</label>
            <input id="newPassword" type="text" placeholder="letters, numbers, symbols" />
          </div>
          <div style="flex:0 0 auto">
            <button id="createBtn">Create</button>
          </div>
        </div>
        <div id="msg"></div>
      </div>

      <div class="card">
        <h2>Broadcast to fleet <span class="muted" id="fleetState"></span></h2>
        <div class="muted" style="margin-bottom:8px">Sends one message to every printer on the Hershey Highway channel.</div>
        <div class="row">
          <div>
            <label>Type</label>
            <select id="bcFormat">
              <option value="plain">Text</option>
              <option value="alert">Alert (MUIE)</option>
            </select>
          </div>
          <div>
            <label>Font</label>
            <select id="bcFont">
              <option value="1">1 — Mono</option>
              <option value="2">2 — Jersey 10</option>
              <option value="3">3 — Jacquard 12</option>
              <option value="4">4 — Doto</option>
            </select>
          </div>
          <div id="bcAlertType" style="display:none">
            <label>Alert type</label>
            <select id="bcType">
              <option>emerg</option><option>alert</option><option>crit</option><option>err</option>
              <option selected>warning</option><option>notice</option><option>info</option><option>debug</option>
            </select>
          </div>
          <div id="bcServiceWrap" style="display:none">
            <label>Service</label>
            <input id="bcService" type="text" placeholder="e.g. hq" />
          </div>
        </div>
        <label>Message</label>
        <input id="bcText" type="text" placeholder="Message to print on every printer" />
        <div class="row" style="margin-top:10px">
          <div style="flex:2">
            <label>Bypass code (app static code)</label>
            <input id="bcBypass" type="password" placeholder="required to broadcast / check" />
          </div>
          <div style="flex:0 0 auto; align-self:flex-end">
            <button id="bcCheckBtn" class="secondary">Check</button>
          </div>
          <div style="flex:0 0 auto; align-self:flex-end">
            <button id="broadcastBtn" class="danger">Broadcast</button>
          </div>
        </div>
        <div id="bcMsg" style="font-size:13px; min-height:18px; margin-top:8px"></div>

        <div id="fleetDevices" style="margin-top:12px; display:none">
          <div class="muted" id="fleetSummary" style="margin-bottom:6px"></div>
          <div class="scroll">
            <table>
              <thead>
                <tr><th>IP</th><th>Serial</th><th>Model</th><th>App</th><th>Connected</th></tr>
              </thead>
              <tbody id="fleetBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Active passwords <span class="muted" id="deviceState"></span></h2>
        <div class="scroll">
          <table>
            <thead>
              <tr><th>Password</th><th>User</th><th>Used / Max</th><th>Remaining</th><th>Status</th><th></th></tr>
            </thead>
            <tbody id="pwBody"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2>Print history</h2>
        <div class="scroll">
          <table>
            <thead>
              <tr><th>When</th><th>Format</th><th>User</th><th>Label</th><th>Status</th></tr>
            </thead>
            <tbody id="histBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let master = '';

    async function api(path, extra = {}) {
      const resp = await fetch(path, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: master, ...extra }),
      });
      return { ok: resp.ok, data: await resp.json().catch(() => ({})) };
    }

    async function login() {
      master = $('master').value;
      const { ok } = await api('/admin/state');
      if (!ok) {
        const m = $('loginMsg'); m.textContent = 'Wrong master password'; m.classList.remove('hidden');
        return;
      }
      $('loginCard').classList.add('hidden');
      $('portal').classList.remove('hidden');
      refresh();
    }

    function fmtTime(ts) {
      const d = new Date(ts * 1000);
      return d.toLocaleString();
    }
    function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    async function refresh() {
      const { ok, data } = await api('/admin/state');
      if (!ok) return;
      $('deviceState').textContent = data.device_connected ? '· device connected' : '· no device connected';
      const fc = data.fleet_count || 0;
      $('fleetState').textContent = `· ${fc} printer${fc === 1 ? '' : 's'} on the fleet`;

      $('pwBody').innerHTML = (data.passwords || []).map(p => {
        const status = p.revoked ? '<span class="pill off">revoked</span>'
          : (p.active ? '<span class="pill ok">active</span>' : '<span class="pill off">exhausted</span>');
        const btn = p.revoked ? '' :
          `<button class="danger" data-revoke="${esc(p.password)}">Revoke</button>`;
        return `<tr>
          <td class="mono">${esc(p.password)}</td>
          <td>${esc(p.user) || '<span class="muted">—</span>'}</td>
          <td>${p.used} / ${p.max_uses}</td>
          <td>${p.remaining}</td>
          <td>${status}</td>
          <td>${btn}</td></tr>`;
      }).join('') || '<tr><td colspan="6" class="muted">No passwords yet.</td></tr>';

      $('histBody').innerHTML = (data.history || []).map(h => `
        <tr>
          <td>${fmtTime(h.timestamp)}</td>
          <td>${esc(h.format)}</td>
          <td>${esc(h.user) || '<span class="muted">—</span>'}</td>
          <td>${esc(h.label)}</td>
          <td>${esc(h.status)}</td></tr>`).join('')
        || '<tr><td colspan="5" class="muted">Nothing printed yet.</td></tr>';

      document.querySelectorAll('[data-revoke]').forEach(b => {
        b.onclick = async () => { await api('/admin/revoke', { target: b.getAttribute('data-revoke') }); refresh(); };
      });
    }

    async function create() {
      const user = $('newUser').value;
      const max_uses = parseInt($('newMax').value, 10) || 1;
      const new_password = $('newPassword').value;
      const { ok, data } = await api('/admin/create', { user, max_uses, new_password });
      const msg = $('msg');
      if (ok) {
        msg.style.color = '#2E7D32';
        msg.textContent = `Created "${data.password.password}" for ${data.password.user || '—'} (${data.password.max_uses} uses)`;
        $('newPassword').value = '';
        refresh();
      } else {
        msg.style.color = '#C62828';
        msg.textContent = data.error || 'Create failed';
      }
    }

    function syncBcFields() {
      const isAlert = $('bcFormat').value === 'alert';
      $('bcAlertType').style.display = isAlert ? '' : 'none';
      $('bcServiceWrap').style.display = isAlert ? '' : 'none';
    }

    async function broadcast() {
      const fmt = $('bcFormat').value;
      const payload = { format: fmt, text: $('bcText').value, font: parseInt($('bcFont').value, 10) };
      if (fmt === 'alert') {
        payload.alert_type = $('bcType').value;
        payload.service = $('bcService').value || 'home';
        payload.sent_at = Math.floor(Date.now() / 1000);
      }
      const { ok, data } = await api('/admin/broadcast', { bypass_code: $('bcBypass').value, payload });
      const m = $('bcMsg');
      if (ok) { m.style.color = '#2E7D32'; m.textContent = `Broadcast to ${data.delivered} printer(s)`; refresh(); }
      else { m.style.color = '#C62828'; m.textContent = data.error || 'Broadcast failed'; }
    }

    $('loginBtn').addEventListener('click', login);
    $('master').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    $('createBtn').addEventListener('click', create);
    function fmtDuration(secs) {
      if (secs < 60) return secs + 's';
      if (secs < 3600) return Math.floor(secs / 60) + 'm ' + (secs % 60) + 's';
      return Math.floor(secs / 3600) + 'h ' + Math.floor((secs % 3600) / 60) + 'm';
    }

    async function checkFleet() {
      const { ok, data } = await api('/admin/fleet', { bypass_code: $('bcBypass').value });
      const m = $('bcMsg'), box = $('fleetDevices');
      if (!ok || !data.valid) {
        m.style.color = '#C62828'; m.textContent = data.error || 'Invalid bypass code';
        box.style.display = 'none';
        return;
      }
      m.style.color = '#2E7D32'; m.textContent = 'Bypass code valid.';
      box.style.display = '';
      $('fleetSummary').textContent = `${data.count} device${data.count === 1 ? '' : 's'} on the fleet channel`;
      $('fleetBody').innerHTML = (data.devices || []).map(d => `
        <tr>
          <td class="mono">${esc(d.ip)}</td>
          <td class="mono">${esc(d.serial) || '<span class="muted">—</span>'}</td>
          <td>${esc(d.model) || '<span class="muted">—</span>'}</td>
          <td>${esc(d.version) || '<span class="muted">—</span>'}</td>
          <td>${fmtDuration(d.connected_secs)}</td></tr>`).join('')
        || '<tr><td colspan="5" class="muted">No devices connected.</td></tr>';
    }

    $('bcFormat').addEventListener('change', syncBcFields);
    $('broadcastBtn').addEventListener('click', broadcast);
    $('bcCheckBtn').addEventListener('click', checkFleet);
    syncBcFields();
    setInterval(() => { if (!$('portal').classList.contains('hidden')) refresh(); }, 8000);
  </script>
</body>
</html>
