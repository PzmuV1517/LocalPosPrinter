<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Public Print</title>
  <style>
    @font-face { font-family:'Fira Code'; font-weight:400; src:url('/fonts/FiraCode-Regular.ttf'); }
    @font-face { font-family:'Fira Code'; font-weight:700; src:url('/fonts/FiraCode-Bold.ttf'); }
    :root { --bg:#000; --surface:#0e0e0e; --border:#262626; --text:#ededed; --muted:#6e6e6e; --hot:#e5484d; }
    * { box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); margin:0; font-family:'Fira Code',ui-monospace,monospace; }
    .wrap { max-width:900px; margin:0 auto; padding:18px; }
    .brand { font-size:22px; letter-spacing:5px; font-weight:700; margin:10px 0 2px; }
    .brand::after { content:"_"; color:var(--text); animation:blink 1.1s step-end infinite; margin-left:3px; }
    @keyframes blink { 0%,50%{opacity:1} 50.01%,100%{opacity:0} }
    .tag { color:var(--muted); font-size:12px; letter-spacing:1px; text-transform:uppercase; margin-bottom:16px; }
    .two { display:flex; gap:18px; flex-wrap:wrap; }
    .col { flex:1; min-width:300px; }
    .card { background:var(--surface); border:1px solid var(--border); padding:16px; margin-bottom:16px; }
    label { display:block; font-size:11px; color:var(--muted); margin:12px 0 5px; text-transform:uppercase; letter-spacing:.6px; }
    input, select, textarea { width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border);
      border-radius:0; padding:9px 11px; font-size:13px; font-family:inherit; }
    textarea { min-height:120px; resize:vertical; }
    button { background:#1e1e1e; color:var(--text); border:1px solid #333; border-radius:0; padding:9px 14px;
      font-size:13px; font-family:inherit; cursor:pointer; }
    button::before { content:"["; opacity:.5; margin-right:5px; } button::after { content:"]"; opacity:.5; margin-left:5px; }
    button:hover { background:#2b2b2b; }
    .row { display:flex; gap:10px; margin-top:16px; }
    .hidden { display:none; }
    #result { font-size:13px; margin-top:10px; min-height:18px; }
    #result.ok { color:var(--text); } #result.bad { color:var(--hot); }
    .preview-box { border:1px solid var(--border); background:#161616; padding:14px; text-align:center; }
    .preview-box img { width:384px; max-width:100%; image-rendering:pixelated; background:#fff; }
    .hint { color:var(--muted); font-size:11px; margin-top:6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">PUBLIC PRINT</div>
    <div class="tag">enter your one-time password to print</div>
    <div class="two">
      <div class="col">
        <div class="card">
          <label>Access password</label>
          <input id="password" type="text" placeholder="the temporary password you were given" autocomplete="off" />

          <label>Format</label>
          <select id="format">
            <option value="plain">Plain</option>
            <option value="centered">Centered</option>
            <option value="boxed">Boxed</option>
            <option value="header_body">Header + Body</option>
            <option value="banner">Banner</option>
            <option value="alert">Alert (MUIE)</option>
          </select>

          <div data-field="alert_type" class="hidden">
            <label>Alert type</label>
            <select id="alert_type">
              <option value="emerg">emerg</option><option value="alert">alert</option>
              <option value="crit">crit</option><option value="err">err</option>
              <option value="warning" selected>warning</option><option value="notice">notice</option>
              <option value="info">info</option><option value="debug">debug</option>
            </select>
          </div>
          <div data-field="service" class="hidden">
            <label>Service</label><input id="service" type="text" placeholder="e.g. front-desk" />
          </div>
          <div data-field="title">
            <label>Title</label><input id="title" type="text" placeholder="Title" />
          </div>
          <div data-field="text">
            <label>Text</label><textarea id="text" maxlength="600" placeholder="Text to print… (max 600 chars)"></textarea>
          </div>

          <div class="row">
            <button id="previewBtn" type="button">Preview</button>
            <button id="printBtn" type="button">Print</button>
          </div>
          <div id="result"></div>
          <div class="hint">Each print uses one of your password's allowed uses.</div>
        </div>
      </div>
      <div class="col">
        <label style="margin-top:0">Preview, what prints</label>
        <div class="preview-box"><img id="preview" alt="preview" /></div>
      </div>
    </div>
  </div>
  <script src="/public-print.js"></script>
</body>
</html>
